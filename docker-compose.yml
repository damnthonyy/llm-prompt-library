# Full-stack local run: `docker compose up --build`
# Web → http://localhost:5173   API → http://localhost:4000
services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    ports:
      - '4000:4000'
    environment:
      # Kept as development so auth cookies aren't `secure` over plain http.
      NODE_ENV: development
      WEB_ORIGIN: http://localhost:5173
      JWT_SECRET: change-me-for-real-deployments
      # Absolute path on the mounted volume (avoids hiding prisma/ migrations).
      DATABASE_URL: file:/data/app.db
    volumes:
      - api-data:/data

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        VITE_API_URL: http://localhost:4000
    ports:
      - '5173:5173'
    depends_on:
      - api

volumes:
  api-data:
